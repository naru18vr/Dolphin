name: Validate Dolphin
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Japanese holiday classification
        run: node --test tests/holiday.test.mjs
      - name: Check timetable data policy
        run: python3 scripts/validate_timetables.py
