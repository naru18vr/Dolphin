name: Update bus timetables
on:
  push:
    branches: [main]
    paths:
      - scripts/update_timetables.py
      - .github/workflows/update-timetables.yml
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download published timetables
        run: python3 scripts/update_timetables.py
      - name: Save timetable cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/timetables.json
          git diff --cached --quiet || git commit -m "Update bus timetables"
          git push
