name: Validate Dolphin timetable data

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Test Japan holiday and timetable calculations
        run: node --test tests/*.test.mjs
      - name: Validate timetable data structure
        run: node scripts/validate_timetables.mjs
      - name: Report and check change from previous timetable data
        run: node scripts/report_timetable_diff.mjs
